services:
  bot:
    build: .
    restart: unless-stopped
    environment:
      TELEGRAM_TOKEN: ${TELEGRAM_TOKEN}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5.2}
      IMAGE_MODEL: ${IMAGE_MODEL:-gpt-image-1-mini}
      ROUTER_MODEL: ${ROUTER_MODEL:-gpt-5-mini}
      SYSTEM_PROMPT: ${SYSTEM_PROMPT}
      ALLOWED_TG_IDS: ${ALLOWED_TG_IDS}
      MAX_HISTORY_MSGS: ${MAX_HISTORY_MSGS:-20}
      STREAM_THROTTLE_MS: ${STREAM_THROTTLE_MS:-600}
      MAX_FILE_MB: ${MAX_FILE_MB:-20}
      REQUEST_TIMEOUT_SEC: ${REQUEST_TIMEOUT_SEC:-120}
      TRANSCRIBE_MODEL: ${TRANSCRIBE_MODEL:-whisper-1}
